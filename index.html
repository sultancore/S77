<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sultan">
<meta name="theme-color" content="#F9F7F4">
<title>Sultan · Daily</title>
<style>
:root{--bg:#F9F7F4;--bg2:#F0EDE8;--white:#FFFFFF;--ink:#111010;--ink2:#3A3530;--ink3:#8A8480;--ink4:#C0BCB8;--gold:#C8860A;--gold2:#E8A010;--golddim:rgba(200,134,10,.10);--goldbr:rgba(200,134,10,.22);--navy:#0D1E3A;--navy2:#162840;--red:#B83020;--reddim:rgba(184,48,32,.08);--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.10);--shadow:0 2px 16px rgba(0,0,0,.07);--nav-h:68px;--r:16px;--r2:24px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}
.pages{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;padding-bottom:calc(var(--nav-h)+24px);opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .26s,transform .26s}
.page.on{opacity:1;transform:none;pointer-events:auto}
nav{height:var(--nav-h);background:var(--white);border-top:1px solid var(--border2);display:flex;z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;padding:8px 2px}
.nb.on .ni svg{stroke:var(--gold)}
.nb.on .nl{color:var(--gold)}
.ni svg{width:20px;height:20px;stroke:var(--ink4)}
.nl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.pad{padding:0 18px}
.card{background:var(--white);border-radius:var(--r2);border:1px solid var(--border);padding:20px;margin-bottom:10px;box-shadow:var(--shadow)}
.label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.pg-title{font-size:26px;font-weight:800;letter-spacing:-.3px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;opacity:0;transition:all .25s;z-index:999}
.toast.on{opacity:1;transform:translateX(-50%)translateY(-10px)}
</style>
</head>
<body>
<div id="app">
<div class="pages">

<!-- PAGE 0 - TODAY -->
<div class="page on" id="p0">
  <div style="padding:20px 18px 8px"><div class="pg-title">Today</div></div>
  <div class="pad">
    <div class="card">
      <div class="label">Readiness Score</div>
      <div style="text-align:center;font-size:52px;font-weight:800;color:var(--gold)" id="readiness">85</div>
    </div>
  </div>
</div>

<!-- PAGE 4 - PROGRESS (with smart features) -->
<div class="page" id="p4">
  <div style="padding:20px 18px 8px"><div class="pg-title">Progress</div><div class="pg-sub">86 → 77 kg</div></div>
  <div class="pad">
    <div class="card">
      <div class="label">SMART INSIGHTS</div>
      <div id="smart-insight" style="font-size:15px;line-height:1.5">Log weight daily to see projection</div>
      <div id="projected-date" style="margin-top:12px;font-weight:700"></div>
    </div>
    <div class="card">
      <div class="label">Log Today's Weight</div>
      <input id="w-inp" type="number" step="0.1" placeholder="86.0" style="width:100%;padding:12px;font-size:18px;border:1px solid var(--border2);border-radius:12px">
      <button onclick="logW()" style="margin-top:10px;width:100%;padding:14px;background:var(--gold);color:#fff;border:none;border-radius:12px;font-weight:700">Save Weight</button>
    </div>
    <div class="card">
      <div class="label">Import Data</div>
      <button onclick="importCSV('whoop')" style="width:100%;padding:12px;margin:6px 0;background:var(--gold);color:#fff;border:none;border-radius:12px">WHOOP CSV</button>
      <button onclick="importCSV('inbody')" style="width:100%;padding:12px;margin:6px 0;background:var(--gold);color:#fff;border:none;border-radius:12px">InBody CSV</button>
      <button onclick="importCSV('cpap')" style="width:100%;padding:12px;margin:6px 0;background:var(--gold);color:#fff;border:none;border-radius:12px">myAir CPAP CSV</button>
    </div>
  </div>
</div>

<!-- PAGE 5 - CALENDAR -->
<div class="page" id="p5">
  <div style="padding:20px 18px 8px"><div class="pg-title">Calendar</div><div id="cal-month" style="color:var(--ink3)"></div></div>
  <div class="pad" id="calendar-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center"></div>
  <div id="day-detail" class="card" style="margin:16px 18px;display:none"></div>
</div>

</div>

<nav>
  <button class="nb on" onclick="gp(0,this)">Today</button>
  <button class="nb" onclick="gp(4,this)">Progress</button>
  <button class="nb" onclick="gp(5,this)">Calendar</button>
</nav>
</div>

<div class="toast" id="toast"></div>

<script>
const ld = (k,d) => {try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const sv = (k,v) => {try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const td = () => {const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

function gp(i){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('p'+i).classList.add('on');
  if(i===4) calculateSmartProgress();
  if(i===5) renderCalendar();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  setTimeout(()=>{t.classList.remove('on')},2000);
}

function logW(){
  const v=parseFloat(document.getElementById('w-inp').value);
  if(!v) return toast("Enter weight");
  let ws=ld('s_weights',[]);
  ws.push({d:td(),w:v});
  sv('s_weights',ws);
  document.getElementById('w-inp').value='';
  toast(v+" kg saved");
  calculateSmartProgress();
}

function calculateSmartProgress(){
  const ws=ld('s_weights',[]);
  if(ws.length<3){
    document.getElementById('smart-insight').innerHTML="Log weight a few days to see projection to 77 kg";
    return;
  }
  const first=ws[0].w;
  const last=ws[ws.length-1].w;
  const days=(new Date()-new Date(ws[0].d))/86400000;
  const weeklyLoss=((first-last)/days)*7;
  const remaining=last-77;
  const daysLeft=Math.ceil(remaining/(weeklyLoss/7));
  const proj=new Date();
  proj.setDate(proj.getDate()+daysLeft);

  document.getElementById('smart-insight').innerHTML=`Weekly loss: <b>${weeklyLoss.toFixed(2)} kg</b>`;
  document.getElementById('projected-date').innerHTML=`Projected 77 kg: <b>${proj.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</b>`;
}

function renderCalendar(){
  const grid=document.getElementById('calendar-grid');
  const header=document.getElementById('cal-month');
  const now=new Date();
  header.textContent=now.toLocaleString('default',{month:'long',year:'numeric'});
  grid.innerHTML='';

  const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  for(let i=0;i<firstDay;i++) grid.innerHTML+='<div></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasData=ld('s_weights',[]).some(w=>w.d===dateStr);
    const bg=hasData?'var(--gold)':'#eee';
    const color=hasData?'#fff':'#111';
    grid.innerHTML+=`<div onclick="showDay('${dateStr}')" style="background:${bg};color:${color};padding:10px;border-radius:8px;cursor:pointer">${d}</div>`;
  }
}

function showDay(dateStr){
  const detail=document.getElementById('day-detail');
  const ws=ld('s_weights',[]).filter(w=>w.d===dateStr);
  let html=`<div class="label">${dateStr}</div>`;
  if(ws.length) html+=`<div>Weight: <b>${ws[ws.length-1].w} kg</b></div>`;
  else html+='<div>No weight logged</div>';
  detail.innerHTML=html;
  detail.style.display='block';
}

window.importCSV=function(type){
  toast(`Select your ${type.toUpperCase()} CSV file`);
};

window.onload=()=>{
  renderCalendar();
  calculateSmartProgress();
  toast("App ready with Calendar + Smart Progress");
};
</script>
</body>
</html>
